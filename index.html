<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>荒野回声 HTML 开放世界冒险</title>
<style>
:root{--bg:#05090b;--glass:rgba(8,13,18,.72);--line:rgba(255,255,255,.16);--text:#eff8ff;--gold:#ffd76a;--bad:#ff6b70;--good:#80ef9f}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Arial,"Noto Sans SC",sans-serif;user-select:none}canvas#game{display:block;width:100vw;height:100vh;background:#07100d}.hud{position:fixed;inset:0;pointer-events:none;text-shadow:0 2px 10px #000}.card{background:var(--glass);border:1px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:0 18px 55px rgba(0,0,0,.35);backdrop-filter:blur(10px)}.top{position:absolute;left:14px;top:14px;display:flex;gap:12px;align-items:flex-start}.bars{width:min(340px,42vw)}.label{font-size:12px;display:flex;justify-content:space-between;color:#e9f6ff}.bar{height:13px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:999px;overflow:hidden;margin:6px 0 9px}.fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,#69e88a,#e9ff7b)}.hp .fill{background:linear-gradient(90deg,#ff5f76,#ffb36a)}.st .fill{background:linear-gradient(90deg,#48adff,#8ff7ff)}.xp .fill{background:linear-gradient(90deg,#b18cff,#ffd76a)}#quest{max-width:min(450px,45vw);font-size:13px;line-height:1.45;color:#dff4ff}#quest b{color:var(--gold)}#side{position:absolute;right:14px;top:14px;display:flex;flex-direction:column;gap:12px;align-items:flex-end}#mini{width:168px;height:168px;border:1px solid var(--line);border-radius:18px;background:rgba(5,9,13,.8)}#stats{font-size:12px;line-height:1.55;min-width:168px;color:#dbefff}#toast{position:absolute;left:50%;bottom:80px;transform:translateX(-50%);max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:rgba(7,11,16,.78);border:1px solid var(--line);border-radius:999px;padding:10px 16px;opacity:0;transition:.22s;backdrop-filter:blur(10px)}#toast.show{opacity:1;bottom:94px}#prompt{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);display:none;background:rgba(7,11,16,.78);border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:14px;backdrop-filter:blur(10px)}#panel{position:absolute;right:14px;bottom:14px;display:none;width:min(430px,92vw);max-height:62vh;overflow:auto;font-size:14px;line-height:1.55}.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 42%,rgba(52,91,96,.62),rgba(2,5,8,.93) 60%,#020406);pointer-events:auto}.menu{width:min(760px,92vw);padding:28px;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(10,18,25,.82),rgba(6,9,14,.74));box-shadow:0 30px 110px rgba(0,0,0,.5);backdrop-filter:blur(14px)}.menu h1{margin:0 0 10px;font-size:clamp(38px,7vw,74px);line-height:.9;letter-spacing:-2px;background:linear-gradient(90deg,#fff,#bdeaff,#ffd76a);-webkit-background-clip:text;background-clip:text;color:transparent}.menu p{color:#d0e8f6;line-height:1.65}.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}button{cursor:pointer;border:0;border-radius:13px;padding:11px 16px;font-size:15px;font-weight:800;color:#06111b;background:linear-gradient(180deg,#f7fbff,#c7eaff);box-shadow:0 10px 25px rgba(80,168,255,.22)}button.secondary{background:rgba(255,255,255,.1);color:#f2fbff;border:1px solid var(--line);box-shadow:none}.help{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-top:16px;font-size:13px;color:#e3f4ff}.help kbd,#panel kbd{font-family:ui-monospace,Menlo,Consolas,monospace;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-bottom-color:rgba(255,255,255,.38);border-radius:6px;padding:1px 6px;color:#fff}.damage{animation:damage .18s linear 0s 2}@keyframes damage{50%{filter:sepia(1) saturate(4) hue-rotate(315deg)}}@media(max-width:760px){.top{flex-direction:column}.bars{width:260px}#quest{display:none}#mini{width:132px;height:132px}#stats{min-width:132px}.card{padding:10px 12px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="top"><div class="card bars"><div class="label"><span>生命</span><span id="hpTxt"></span></div><div class="bar hp"><div id="hpFill" class="fill"></div></div><div class="label"><span>体力</span><span id="stTxt"></span></div><div class="bar st"><div id="stFill" class="fill"></div></div><div class="label"><span>经验</span><span id="xpTxt"></span></div><div class="bar xp"><div id="xpFill" class="fill"></div></div></div><div id="quest" class="card"></div></div>
  <div id="side"><canvas id="mini" width="168" height="168"></canvas><div id="stats" class="card"></div></div>
  <div id="panel" class="card"></div><div id="toast"></div><div id="prompt"></div>
</div>
<div id="start" class="center"><div class="menu"><h1>荒野回声</h1><p><b>Echoes of the Wild</b> 是一个单文件 HTML Canvas 开放世界冒险游戏，可以直接放进 GitHub Pages。世界会程序生成，有森林、湖泊、山脊、村庄、废墟、狼群、草药、宝箱、昼夜和雨雾。</p><p>目标：找到散落在荒野中的 <b>5 枚星核碎片</b>，回到村口找长者点亮灯塔。</p><div class="buttons"><button id="playBtn">开始冒险</button><button id="resetBtn" class="secondary">清除存档</button></div><div class="help"><div><kbd>WASD</kbd> 或 <kbd>方向键</kbd> 移动</div><div><kbd>Shift</kbd> 奔跑</div><div><kbd>Space</kbd> 攻击</div><div><kbd>E</kbd> 互动/采集</div><div><kbd>H</kbd> 使用草药</div><div><kbd>I</kbd> 背包</div><div><kbd>M</kbd> 星核方向</div><div><kbd>F5</kbd> 手动存档</div></div></div></div>
<script>
(() => {
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d',{alpha:false});
const mini=document.getElementById('mini'),mctx=mini.getContext('2d');
const start=document.getElementById('start'),hpFill=document.getElementById('hpFill'),stFill=document.getElementById('stFill'),xpFill=document.getElementById('xpFill');
const hpTxt=document.getElementById('hpTxt'),stTxt=document.getElementById('stTxt'),xpTxt=document.getElementById('xpTxt'),questBox=document.getElementById('quest'),statsBox=document.getElementById('stats'),toastBox=document.getElementById('toast'),promptBox=document.getElementById('prompt'),panel=document.getElementById('panel');
const TILE=48,CHUNK=16,SAVE='echoes_wild_single_html_save',TAU=Math.PI*2;
let W=1,H=1,DPR=1,last=performance.now(),running=false,time=0,toastT=0,shake=0,nearest=null,mapHint=0,miniT=0,weatherSeed=Math.random()*9999;
const keys=Object.create(null),enemies=new Map(),particles=[],floatText=[];
const player={x:0,y:0,vx:0,vy:0,dir:0,fx:0,fy:1,hp:100,maxHp:100,st:100,maxSt:100,xp:0,level:1,gold:0,herbs:1,wood:0,stone:0,shards:0,kills:0,attack:0,inv:0,step:0};
const world={collected:{},opened:{},killed:{},seen:{},questDone:false,elder:false};
const elder={id:'elder',type:'npc',x:2.5,y:1.7,name:'守灯长者'};
const shards=[[-31,-18],[35,-22],[18,32],[-42,21],[57,9],[-13,54],[8,-55]];
function clamp(v,a,b){return v<a?a:v>b?b:v}function lerp(a,b,t){return a+(b-a)*t}function smooth(t){return t*t*(3-2*t)}function key(x,y){return x+','+y}function id(k,x,y){return k+':'+x+','+y}function d2(ax,ay,bx,by){const x=ax-bx,y=ay-by;return x*x+y*y}
function hash(x,y,s=0){let h=Math.imul(x|0,374761393)^Math.imul(y|0,668265263)^Math.imul((s+31)|0,2246822519);h=(h^(h>>>13))|0;h=Math.imul(h,1274126177);return((h^(h>>>16))>>>0)/4294967295}
function noise(x,y,s=0){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const a=hash(ix,iy,s),b=hash(ix+1,iy,s),c=hash(ix,iy+1,s),d=hash(ix+1,iy+1,s);return lerp(lerp(a,b,smooth(fx)),lerp(c,d,smooth(fx)),smooth(fy))}
function fbm(x,y,s=0){let v=0,a=.55,f=1;for(let i=0;i<5;i++){v+=noise(x*f,y*f,s+i*17)*a;f*=2.03;a*=.5}return clamp(v,0,1)}
function inVillage(x,y){const r=Math.hypot(x,y);return r<8||Math.abs(y)<1.15&&Math.abs(x)<22||Math.abs(x)<1.15&&Math.abs(y)<18}
function terrain(tx,ty){tx=Math.floor(tx);ty=Math.floor(ty);if(Math.hypot(tx,ty)<5)return{t:'village',walk:1,spd:1,c:'#6c725d'};if(inVillage(tx,ty)){if(Math.abs(tx)<1||Math.abs(ty)<1)return{t:'road',walk:1,spd:1.08,c:'#7a7057'};return{t:'meadow',walk:1,spd:1,c:'#4f7744'}}const h=fbm(tx*.032,ty*.032,8),w=fbm(tx*.05+33,ty*.05-71,13),tr=fbm(tx*.09-18,ty*.09+44,27);if(h<.23)return{t:'deep',walk:0,spd:.2,c:'#10283e'};if(h<.30)return{t:'water',walk:1,spd:.52,c:'#1d5874'};if(h<.34)return{t:'shore',walk:1,spd:.82,c:'#8b8057'};if(h>.78)return{t:'mountain',walk:0,spd:.3,c:'#696a66'};if(h>.68)return{t:'rock',walk:1,spd:.75,c:'#777468'};if(w>.68)return{t:'marsh',walk:1,spd:.65,c:'#315f48'};if(tr>.6)return{t:'forest',walk:1,spd:.88,c:'#245c34'};if(w<.25)return{t:'dry',walk:1,spd:1,c:'#7d7042'};return{t:'grass',walk:1,spd:1,c:'#3e7b3f'}}
function objectAt(tx,ty){tx=Math.floor(tx);ty=Math.floor(ty);if(tx===3&&ty===2)return elder;if(tx===0&&ty===-3)return{id:'fire',type:'fire',x:.4,y:-2.7};if(tx===-4&&ty===1)return{id:'house1',type:'house',x:-4,y:1,w:2.3,h:1.8,block:1};if(tx===5&&ty===-2)return{id:'house2',type:'house',x:5,y:-2,w:2.6,h:1.9,block:1};for(let i=0;i<shards.length;i++){const s=shards[i];if(tx===s[0]&&ty===s[1]&&!world.collected[id('shard',tx,ty)])return{id:id('shard',tx,ty),type:'shard',x:tx+.5,y:ty+.5,idx:i}}const t=terrain(tx,ty);if(inVillage(tx,ty))return null;const r=hash(tx,ty,99);if(t.t==='forest'&&r>.52&&!world.collected[id('tree',tx,ty)])return{id:id('tree',tx,ty),type:'tree',x:tx+.5,y:ty+.55,block:1,seed:r};if((t.t==='rock'||t.t==='dry')&&r>.82)return{id:id('ore',tx,ty),type:'ore',x:tx+.5,y:ty+.55,block:t.t==='rock'?1:0};if((t.t==='grass'||t.t==='meadow'||t.t==='marsh')&&r>.965&&!world.collected[id('herb',tx,ty)])return{id:id('herb',tx,ty),type:'herb',x:tx+.5,y:ty+.55};if(t.walk&&r>.987&&!world.opened[id('chest',tx,ty)])return{id:id('chest',tx,ty),type:'chest',x:tx+.5,y:ty+.55};return null}
function blocked(x,y){const t=terrain(x,y);if(!t.walk)return true;const ob=objectAt(Math.floor(x),Math.floor(y));if(ob&&ob.block&&d2(x,y,ob.x,ob.y)<.72)return true;return false}
function nearObjects(rad=9){const out=[],px=Math.floor(player.x),py=Math.floor(player.y),r=Math.ceil(rad);for(let y=py-r;y<=py+r;y++)for(let x=px-r;x<=px+r;x++){const ob=objectAt(x,y);if(ob&&d2(player.x,player.y,ob.x,ob.y)<rad*rad)out.push(ob)}return out}
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=canvas.width=Math.floor(innerWidth*DPR);H=canvas.height=Math.floor(innerHeight*DPR);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';mini.width=Math.floor(168*DPR);mini.height=Math.floor(168*DPR)}addEventListener('resize',resize);resize();
function say(txt){toastBox.textContent=txt;toastBox.classList.add('show');toastT=3}
function save(silent=false){localStorage.setItem(SAVE,JSON.stringify({player,world,weatherSeed}));if(!silent)say('已保存')}
function load(){try{const raw=localStorage.getItem(SAVE);if(!raw)return;const s=JSON.parse(raw);Object.assign(player,s.player||{});Object.assign(world,s.world||{});weatherSeed=s.weatherSeed||weatherSeed}catch(e){console.warn(e)}} 
function reset(){localStorage.removeItem(SAVE);location.reload()}load();
function spawnAround(){const pcx=Math.floor(player.x/CHUNK),pcy=Math.floor(player.y/CHUNK);for(let cy=pcy-2;cy<=pcy+2;cy++)for(let cx=pcx-2;cx<=pcx+2;cx++){world.seen[key(cx,cy)]=1;const eid='wolf:'+cx+','+cy;if(enemies.has(eid)||world.killed[eid])continue;if(hash(cx,cy,501)>.55){let x=cx*CHUNK+hash(cx,cy,11)*CHUNK,y=cy*CHUNK+hash(cx,cy,12)*CHUNK;if(Math.hypot(x,y)<18||blocked(x,y))continue;enemies.set(eid,{id:eid,x,y,vx:0,vy:0,hp:36,maxHp:36,cd:0,hit:0})}}for(const [eid,e]of enemies){if(Math.abs(e.x-player.x)>70||Math.abs(e.y-player.y)>70)enemies.delete(eid)}}
function useHerb(){if(player.herbs<=0){say('没有草药');return}if(player.hp>=player.maxHp){say('生命已满');return}player.herbs--;player.hp=clamp(player.hp+32,0,player.maxHp);say('使用草药，生命恢复')}
function interact(){if(!nearest){say('附近没有可以互动的东西');return}const o=nearest;if(o.type==='npc'){if(player.shards>=5&&!world.questDone){world.questDone=true;say('灯塔重新亮起，荒野安静了下来。你完成了主线！')}else if(!world.elder){world.elder=true;say('长者：去废墟寻找 5 枚星核碎片。按 M 可以感知最近的方向。')}else say('长者：星核碎片会在废墟附近发光。')}else if(o.type==='herb'){world.collected[o.id]=1;player.herbs++;addFloat('+草药',o.x,o.y,'#9cff8b');say('采集到草药')}else if(o.type==='tree'){world.collected[o.id]=1;player.wood++;addFloat('+木材',o.x,o.y,'#b88b55');say('砍下一些木材')}else if(o.type==='ore'){player.stone++;addFloat('+石头',o.x,o.y,'#d0d0d0');say('敲下了一块石头')}else if(o.type==='chest'){world.opened[o.id]=1;const g=8+Math.floor(hash(Math.floor(o.x),Math.floor(o.y),333)*30);player.gold+=g;player.herbs+=hash(Math.floor(o.x),Math.floor(o.y),334)>.5?1:0;addFloat('+'+g+' 金币',o.x,o.y,'#ffd76a');say('打开宝箱')}else if(o.type==='shard'){world.collected[o.id]=1;player.shards++;player.xp+=35;addFloat('+星核碎片',o.x,o.y,'#ffe87a');say('获得星核碎片 '+player.shards+'/5')}save(true);updateHUD()}
function attack(){if(player.attack>0)return;player.attack=.32;shake=6;const ax=player.x+player.fx*1.1,ay=player.y+player.fy*1.1;let hit=false;for(const [id,e] of enemies){if(d2(ax,ay,e.x,e.y)<2.2){e.hp-=22+player.level*3;e.hit=.18;e.vx+=player.fx*4;e.vy+=player.fy*4;hit=true;addFloat('-'+(22+player.level*3),e.x,e.y,'#ffb0b0');for(let i=0;i<10;i++)spark(e.x,e.y,'#ff6b70')}if(e.hp<=0){world.killed[id]=1;enemies.delete(id);player.kills++;player.xp+=20;player.gold+=3;addFloat('+经验',e.x,e.y,'#ffd76a')}}if(!hit)for(let i=0;i<4;i++)spark(ax,ay,'#eaf7ff')}
function addFloat(text,x,y,color){floatText.push({text,x,y,t:1,color})}function spark(x,y,color){particles.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:.5,ttl:.5,r:2+Math.random()*2,color})}
function nearestShard(){let best=null,bd=1e9;for(const s of shards){const sid=id('shard',s[0],s[1]);if(world.collected[sid])continue;const dd=d2(player.x,player.y,s[0]+.5,s[1]+.5);if(dd<bd){bd=dd;best=s}}return best}
function keyDown(e){const k=e.key.toLowerCase();keys[k]=true;if(['arrowup','arrowdown','arrowleft','arrowright',' ','shift'].includes(k))e.preventDefault();if(k==='e')interact();if(k==='h')useHerb();if(k===' ')attack();if(k==='i'){panel.style.display=panel.style.display==='block'?'none':'block';updatePanel()}if(k==='m'){const s=nearestShard();if(s){const dx=s[0]+.5-player.x,dy=s[1]+.5-player.y;say('星核感应：向 '+dirName(dx,dy)+'，距离约 '+Math.round(Math.hypot(dx,dy))+' 格');mapHint=3}else say('所有星核都找到了')}if(k==='f5'){e.preventDefault();save()}}
function keyUp(e){keys[e.key.toLowerCase()]=false}addEventListener('keydown',keyDown);addEventListener('keyup',keyUp);document.getElementById('playBtn').onclick=()=>{start.style.display='none';running=true;last=performance.now();say('欢迎进入荒野');requestAnimationFrame(loop)};document.getElementById('resetBtn').onclick=reset;
function dirName(dx,dy){if(Math.abs(dx)>Math.abs(dy))return dx>0?'东方':'西方';return dy>0?'南方':'北方'}
function update(dt){time+=dt;spawnAround();if(toastT>0){toastT-=dt;if(toastT<=0)toastBox.classList.remove('show')}if(mapHint>0)mapHint-=dt;if(shake>0)shake=Math.max(0,shake-25*dt);player.attack=Math.max(0,player.attack-dt);player.inv=Math.max(0,player.inv-dt);let mx=(keys.a||keys.arrowleft?-1:0)+(keys.d||keys.arrowright?1:0),my=(keys.w||keys.arrowup?-1:0)+(keys.s||keys.arrowdown?1:0);const moving=mx||my;if(moving){const len=Math.hypot(mx,my);mx/=len;my/=len;player.fx=mx;player.fy=my;player.dir=Math.atan2(my,mx)}const sprint=(keys.shift&&player.st>2&&moving);let sp=(sprint?7.1:4.6)*terrain(player.x,player.y).spd;if(sprint)player.st-=28*dt;else player.st=Math.min(player.maxSt,player.st+18*dt);player.vx=lerp(player.vx,mx*sp,.22);player.vy=lerp(player.vy,my*sp,.22);let nx=player.x+player.vx*dt,ny=player.y+player.vy*dt;if(!blocked(nx,player.y))player.x=nx;else player.vx=0;if(!blocked(player.x,ny))player.y=ny;else player.vy=0;if(moving)player.step+=dt*(sprint?2:1);updateEnemies(dt);updateItems(dt);levelCheck();updateHUD();if(time-miniT>.18){miniT=time;drawMini()}}
function updateEnemies(dt){for(const [id,e] of enemies){e.cd=Math.max(0,e.cd-dt);e.hit=Math.max(0,e.hit-dt);const dd=Math.hypot(player.x-e.x,player.y-e.y);let tx=0,ty=0;if(dd<12){tx=(player.x-e.x)/(dd||1);ty=(player.y-e.y)/(dd||1)}else{tx=Math.cos(hash(Math.floor(e.x),Math.floor(e.y),7)*TAU+time*.25);ty=Math.sin(hash(Math.floor(e.x),Math.floor(e.y),8)*TAU+time*.25)}e.vx=lerp(e.vx,tx*(dd<12?3.4:1.1),.04);e.vy=lerp(e.vy,ty*(dd<12?3.4:1.1),.04);let nx=e.x+e.vx*dt,ny=e.y+e.vy*dt;if(!blocked(nx,e.y))e.x=nx;if(!blocked(e.x,ny))e.y=ny;if(dd<1.1&&e.cd<=0&&player.inv<=0){player.hp-=10;player.inv=.7;e.cd=1.1;shake=9;document.body.classList.add('damage');setTimeout(()=>document.body.classList.remove('damage'),260);addFloat('-10',player.x,player.y,'#ff8a8a');if(player.hp<=0){player.hp=player.maxHp;player.x=0;player.y=0;player.gold=Math.max(0,player.gold-10);say('你被狼击倒，村民把你带回篝火旁')}}}}
function updateItems(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.life<=0)particles.splice(i,1)}for(let i=floatText.length-1;i>=0;i--){const f=floatText[i];f.t-=dt*.7;f.y-=dt*.55;if(f.t<=0)floatText.splice(i,1)}nearest=null;let bd=2.2;for(const o of nearObjects(3)){const dd=d2(player.x,player.y,o.x,o.y);if(dd<bd){bd=dd;nearest=o}}promptBox.style.display=nearest?'block':'none';promptBox.textContent=nearest?('按 E '+actionText(nearest)):''}
function actionText(o){return o.type==='npc'?'与长者交谈':o.type==='tree'?'砍树':o.type==='herb'?'采集草药':o.type==='ore'?'采矿':o.type==='chest'?'打开宝箱':o.type==='shard'?'拾取星核碎片':'互动'}
function levelCheck(){const need=player.level*70;if(player.xp>=need){player.xp-=need;player.level++;player.maxHp+=12;player.maxSt+=8;player.hp=player.maxHp;player.st=player.maxSt;say('升级！现在等级 '+player.level)}}
function updateHUD(){hpFill.style.width=clamp(player.hp/player.maxHp*100,0,100)+'%';stFill.style.width=clamp(player.st/player.maxSt*100,0,100)+'%';xpFill.style.width=clamp(player.xp/(player.level*70)*100,0,100)+'%';hpTxt.textContent=Math.round(player.hp)+'/'+player.maxHp;stTxt.textContent=Math.round(player.st)+'/'+player.maxSt;xpTxt.textContent=Math.round(player.xp)+'/'+player.level*70;const s=nearestShard();let hint=s?'最近星核：'+dirName(s[0]+.5-player.x,s[1]+.5-player.y)+'，约 '+Math.round(Math.hypot(s[0]+.5-player.x,s[1]+.5-player.y))+' 格':'全部星核已找到';questBox.innerHTML='<b>主线</b><br>收集星核碎片 '+player.shards+'/5，然后回村找长者。<br>'+hint+'<br><span style="color:#a8c8dc">按 M 显示方向，按 I 打开背包。</span>';statsBox.innerHTML='等级 '+player.level+'<br>金币 '+player.gold+'<br>草药 '+player.herbs+'<br>击败狼 '+player.kills+'<br>坐标 '+Math.round(player.x)+','+Math.round(player.y)+'<br>'+weatherName();updatePanel()}
function updatePanel(){if(panel.style.display!=='block')return;panel.innerHTML='<h2>背包</h2><p>金币：<b>'+player.gold+'</b><br>草药：<b>'+player.herbs+'</b>，按 <kbd>H</kbd> 使用<br>木材：<b>'+player.wood+'</b><br>石头：<b>'+player.stone+'</b><br>星核碎片：<b>'+player.shards+'/5</b></p><p>提示：宝箱、草药、星核都可以按 <kbd>E</kbd> 互动。森林会挡路，水会减速，狼在夜里更危险。</p>'}
function dayInfo(){const cycle=(time/90+.25)%1;const sun=clamp(Math.sin(cycle*TAU)*.65+.45,0,1);return{cycle,sun,night:sun<.22}}function weather(){return fbm(time*.006,weatherSeed*.01,91)}function weatherName(){const d=dayInfo();const w=weather();return(d.night?'夜晚':'白昼')+(w>.62?'，雨':'，晴')}
function draw(){let camX=player.x,camY=player.y;if(shake>0){camX+=(Math.random()-.5)*shake/TILE;camY+=(Math.random()-.5)*shake/TILE}drawGround(camX,camY);drawObjects(camX,camY);drawEnemies(camX,camY);drawPlayer(camX,camY);drawParticles(camX,camY);drawLight();if(weather()>.62)drawRain()}
function sx(x,cx){return(x-cx)*TILE*DPR+W/2}function sy(y,cy){return(y-cy)*TILE*DPR+H/2}
function drawGround(cx,cy){const minX=Math.floor(cx-W/(2*TILE*DPR))-2,maxX=Math.floor(cx+W/(2*TILE*DPR))+2,minY=Math.floor(cy-H/(2*TILE*DPR))-2,maxY=Math.floor(cy+H/(2*TILE*DPR))+2;ctx.fillStyle='#07100d';ctx.fillRect(0,0,W,H);for(let y=minY;y<=maxY;y++)for(let x=minX;x<=maxX;x++){const t=terrain(x,y),px=sx(x,cx),py=sy(y,cy);ctx.fillStyle=t.c;ctx.fillRect(px,py,TILE*DPR+1,TILE*DPR+1);const n=hash(x,y,5);ctx.fillStyle='rgba(255,255,255,'+(n*.045)+')';ctx.fillRect(px,py,TILE*DPR+1,TILE*DPR+1);if(t.t==='water'||t.t==='deep'){ctx.strokeStyle='rgba(210,245,255,.12)';ctx.lineWidth=1*DPR;ctx.beginPath();ctx.moveTo(px,py+(22+Math.sin(time*2+x)*6)*DPR);ctx.lineTo(px+TILE*DPR,py+(18+Math.cos(time*2+y)*6)*DPR);ctx.stroke()}if(t.t==='road'){ctx.fillStyle='rgba(255,230,160,.08)';for(let i=0;i<3;i++)ctx.fillRect(px+hash(x,y,i)*TILE*DPR,py+hash(x,y,i+9)*TILE*DPR,3*DPR,2*DPR)}if(isRuin(x,y)){ctx.fillStyle='rgba(35,35,39,.45)';ctx.fillRect(px+8*DPR,py+8*DPR,32*DPR,32*DPR)}}}
function isRuin(x,y){for(const s of shards)if(Math.abs(x-s[0])<=2&&Math.abs(y-s[1])<=2&&hash(x,y,701)>.42)return true;return false}
function visibleObjects(){const arr=nearObjects(Math.max(W,H)/(TILE*DPR)+5);return arr.sort((a,b)=>a.y-b.y)}
function drawObjects(cx,cy){for(const o of visibleObjects()){const x=sx(o.x,cx),y=sy(o.y,cy);if(o.type==='tree')tree(x,y,o);else if(o.type==='herb')herb(x,y);else if(o.type==='ore')ore(x,y);else if(o.type==='chest')chest(x,y);else if(o.type==='shard')shard(x,y);else if(o.type==='npc')npc(x,y);else if(o.type==='fire')fire(x,y);else if(o.type==='house')house(x,y,o)}}
function shadow(x,y,w,h,a=.28){ctx.fillStyle='rgba(0,0,0,'+a+')';ctx.beginPath();ctx.ellipse(x,y,w,h,0,0,TAU);ctx.fill()}function tree(x,y,o){shadow(x,y+18*DPR,21*DPR,8*DPR,.28);ctx.fillStyle='#4b2e1f';ctx.fillRect(x-4*DPR,y-20*DPR,8*DPR,35*DPR);const wob=Math.sin(time*1.2+o.seed*8)*2*DPR,g=ctx.createRadialGradient(x-8*DPR+wob,y-40*DPR,3*DPR,x,y-31*DPR,34*DPR);g.addColorStop(0,'#6cab63');g.addColorStop(.55,'#2f713c');g.addColorStop(1,'#173b27');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x-12*DPR+wob,y-30*DPR,22*DPR,0,TAU);ctx.arc(x+11*DPR+wob,y-32*DPR,21*DPR,0,TAU);ctx.arc(x+wob,y-51*DPR,24*DPR,0,TAU);ctx.fill()}function herb(x,y){shadow(x,y+8*DPR,11*DPR,4*DPR,.16);ctx.strokeStyle='#a8ff93';ctx.lineWidth=2*DPR;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(x,y+6*DPR);ctx.quadraticCurveTo(x+(i-2)*5*DPR,y-4*DPR,x+(i-2)*7*DPR,y-14*DPR);ctx.stroke()}}function ore(x,y){shadow(x,y+10*DPR,18*DPR,7*DPR,.26);ctx.fillStyle='#5d5e5d';ctx.beginPath();ctx.moveTo(x-18*DPR,y+8*DPR);ctx.lineTo(x-6*DPR,y-15*DPR);ctx.lineTo(x+15*DPR,y-11*DPR);ctx.lineTo(x+20*DPR,y+9*DPR);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(x-5*DPR,y-10*DPR,12*DPR,3*DPR)}function chest(x,y){shadow(x,y+15*DPR,22*DPR,8*DPR,.3);ctx.fillStyle='#6b3d22';ctx.fillRect(x-20*DPR,y-8*DPR,40*DPR,24*DPR);ctx.fillStyle='#9b622f';ctx.fillRect(x-20*DPR,y-18*DPR,40*DPR,14*DPR);ctx.fillStyle='#ffd76a';ctx.fillRect(x-3*DPR,y-4*DPR,6*DPR,10*DPR)}function shard(x,y){const g=.55+Math.sin(time*4)*.25;ctx.fillStyle='rgba(255,221,91,'+(.2+g*.16)+')';ctx.beginPath();ctx.arc(x,y,30*DPR,0,TAU);ctx.fill();ctx.fillStyle='#ffe879';ctx.beginPath();ctx.moveTo(x,y-24*DPR);ctx.lineTo(x+11*DPR,y);ctx.lineTo(x,y+26*DPR);ctx.lineTo(x-10*DPR,y);ctx.closePath();ctx.fill();ctx.fillStyle='rgba(255,255,255,.55)';ctx.beginPath();ctx.moveTo(x,y-16*DPR);ctx.lineTo(x+4*DPR,y);ctx.lineTo(x,y+9*DPR);ctx.closePath();ctx.fill()}function npc(x,y){shadow(x,y+18*DPR,20*DPR,8*DPR,.25);ctx.fillStyle='#2f3f55';ctx.beginPath();ctx.arc(x,y-18*DPR,12*DPR,0,TAU);ctx.fill();ctx.fillStyle='#d9b78a';ctx.beginPath();ctx.arc(x,y-36*DPR,9*DPR,0,TAU);ctx.fill();ctx.fillStyle='#ffd76a';ctx.font=14*DPR+'px sans-serif';ctx.textAlign='center';ctx.fillText('!',x,y-55*DPR)}function fire(x,y){shadow(x,y+10*DPR,18*DPR,7*DPR,.25);ctx.fillStyle='rgba(255,137,39,.28)';ctx.beginPath();ctx.arc(x,y,34*DPR,0,TAU);ctx.fill();ctx.fillStyle='#70431f';ctx.fillRect(x-18*DPR,y+7*DPR,36*DPR,5*DPR);ctx.fillStyle='#ff7c30';ctx.beginPath();ctx.moveTo(x,y-26*DPR-Math.sin(time*12)*4*DPR);ctx.quadraticCurveTo(x+17*DPR,y-2*DPR,x,y+9*DPR);ctx.quadraticCurveTo(x-18*DPR,y-4*DPR,x,y-26*DPR);ctx.fill();ctx.fillStyle='#ffe879';ctx.beginPath();ctx.moveTo(x,y-17*DPR);ctx.quadraticCurveTo(x+9*DPR,y-2*DPR,x,y+6*DPR);ctx.quadraticCurveTo(x-10*DPR,y-2*DPR,x,y-17*DPR);ctx.fill()}function house(x,y,o){const w=o.w*TILE*DPR,h=o.h*TILE*DPR;shadow(x,y+h*.32,w*.45,h*.18,.23);ctx.fillStyle='#5b4635';ctx.fillRect(x-w/2,y-h/2,w,h);ctx.fillStyle='#2a1f1a';ctx.beginPath();ctx.moveTo(x-w*.58,y-h*.42);ctx.lineTo(x,y-h*.85);ctx.lineTo(x+w*.58,y-h*.42);ctx.closePath();ctx.fill();ctx.fillStyle='#d79b53';ctx.fillRect(x-w*.1,y+h*.08,w*.2,h*.42);ctx.fillStyle='rgba(255,225,135,.45)';ctx.fillRect(x+w*.22,y-h*.15,w*.16,h*.16)}
function drawEnemies(cx,cy){for(const e of enemies.values()){const x=sx(e.x,cx),y=sy(e.y,cy);if(x<-80||y<-80||x>W+80||y>H+80)continue;shadow(x,y+18*DPR,20*DPR,8*DPR,.28);const a=Math.atan2(player.y-e.y,player.x-e.x);ctx.save();ctx.translate(x,y);ctx.rotate(a);ctx.fillStyle=e.hit>0?'#ffb0b0':'#30343a';ctx.beginPath();ctx.ellipse(0,0,24*DPR,13*DPR,0,0,TAU);ctx.arc(19*DPR,0,11*DPR,0,TAU);ctx.fill();ctx.fillStyle='#181a1f';ctx.beginPath();ctx.moveTo(22*DPR,-8*DPR);ctx.lineTo(31*DPR,-18*DPR);ctx.lineTo(30*DPR,-3*DPR);ctx.fill();ctx.beginPath();ctx.moveTo(22*DPR,8*DPR);ctx.lineTo(31*DPR,18*DPR);ctx.lineTo(30*DPR,3*DPR);ctx.fill();ctx.fillStyle='#ff6b70';ctx.beginPath();ctx.arc(25*DPR,-4*DPR,2.5*DPR,0,TAU);ctx.arc(25*DPR,4*DPR,2.5*DPR,0,TAU);ctx.fill();ctx.restore();ctx.fillStyle='rgba(0,0,0,.46)';ctx.fillRect(x-20*DPR,y-29*DPR,40*DPR,5*DPR);ctx.fillStyle='#ff6b70';ctx.fillRect(x-20*DPR,y-29*DPR,40*DPR*clamp(e.hp/e.maxHp,0,1),5*DPR)}}
function drawPlayer(cx,cy){const x=sx(player.x,cx),y=sy(player.y,cy),bob=Math.sin(player.step*8)*2*DPR;shadow(x,y+20*DPR,19*DPR,8*DPR,.32);ctx.save();ctx.translate(x,y+bob);ctx.rotate(player.dir+Math.PI/2);ctx.fillStyle='#1f344c';ctx.beginPath();ctx.ellipse(0,0,12*DPR,18*DPR,0,0,TAU);ctx.fill();ctx.fillStyle='#d9b78a';ctx.beginPath();ctx.arc(0,-20*DPR,9*DPR,0,TAU);ctx.fill();ctx.fillStyle='#4778a8';ctx.fillRect(-6*DPR,-10*DPR,12*DPR,21*DPR);if(player.attack>.18){ctx.strokeStyle='rgba(245,250,255,.95)';ctx.lineWidth=4*DPR;ctx.beginPath();ctx.arc(0,-8*DPR,37*DPR,-.95,.95);ctx.stroke()}ctx.restore()}
function drawParticles(cx,cy){for(const p of particles){const x=sx(p.x,cx),y=sy(p.y,cy),a=clamp(p.life/p.ttl,0,1);ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(x,y,p.r*DPR,0,TAU);ctx.fill();ctx.globalAlpha=1}for(const f of floatText){const x=sx(f.x,cx),y=sy(f.y,cy);ctx.globalAlpha=clamp(f.t,0,1);ctx.fillStyle=f.color;ctx.font=16*DPR+'px system-ui';ctx.textAlign='center';ctx.fillText(f.text,x,y);ctx.globalAlpha=1}}
function drawLight(){const d=dayInfo(),dark=.54-d.sun*.42;ctx.fillStyle='rgba(4,8,18,'+clamp(dark,0,.62)+')';ctx.fillRect(0,0,W,H);const g=ctx.createRadialGradient(W*.5,H*.5,Math.min(W,H)*.08,W*.5,H*.5,Math.max(W,H)*.68);g.addColorStop(0,'rgba(255,244,190,.04)');g.addColorStop(.55,'rgba(255,244,190,0)');g.addColorStop(1,'rgba(0,0,0,'+(.16+dark*.3)+')');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);const fx=sx(.4,player.x),fy=sy(-2.7,player.y);const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,210*DPR);fg.addColorStop(0,'rgba(255,147,59,.30)');fg.addColorStop(.35,'rgba(255,147,59,.12)');fg.addColorStop(1,'rgba(255,147,59,0)');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H)}function drawRain(){ctx.strokeStyle='rgba(185,220,255,.26)';ctx.lineWidth=1.2*DPR;const count=Math.floor(W*H/(22000*DPR));for(let i=0;i<count;i++){const x=(hash(i,Math.floor(time*30),1)*W+time*260*DPR)%W,y=(hash(i,Math.floor(time*30),2)*H+time*520*DPR)%H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-15*DPR,y+28*DPR);ctx.stroke()}}
function drawMini(){const w=mini.width,h=mini.height,s=4*DPR;mctx.clearRect(0,0,w,h);mctx.fillStyle='rgba(5,9,13,.9)';mctx.fillRect(0,0,w,h);for(let yy=-20;yy<=20;yy++)for(let xx=-20;xx<=20;xx++){const t=terrain(Math.floor(player.x)+xx,Math.floor(player.y)+yy);let c='#3e7b3f';if(t.t==='water'||t.t==='deep')c='#2d7897';else if(t.t==='forest')c='#1e572e';else if(t.t==='rock'||t.t==='mountain')c='#77736a';else if(t.t==='road'||t.t==='village')c='#8d7b5f';else if(t.t==='dry')c='#8a7a48';mctx.fillStyle=c;mctx.fillRect(w/2+xx*s,h/2+yy*s,s,s)}for(const o of nearObjects(24)){if(o.type==='shard'||o.type==='chest'||o.type==='npc'){mctx.fillStyle=o.type==='npc'?'#86d7ff':'#ffd76a';mctx.fillRect(w/2+(o.x-player.x)*s-2*DPR,h/2+(o.y-player.y)*s-2*DPR,4*DPR,4*DPR)}}for(const e of enemies.values())if(d2(e.x,e.y,player.x,player.y)<24*24){mctx.fillStyle='#ff6b70';mctx.fillRect(w/2+(e.x-player.x)*s-2*DPR,h/2+(e.y-player.y)*s-2*DPR,4*DPR,4*DPR)}mctx.fillStyle='#fff';mctx.beginPath();mctx.arc(w/2,h/2,4*DPR,0,TAU);mctx.fill();if(mapHint>0){mctx.strokeStyle='rgba(255,215,106,.95)';mctx.lineWidth=3*DPR;mctx.strokeRect(2*DPR,2*DPR,w-4*DPR,h-4*DPR)}}
function loop(now){const dt=Math.min(.033,(now-last)/1000||.016);last=now;if(running){update(dt);draw();requestAnimationFrame(loop)}}
setInterval(()=>{if(running)save(true)},60000);updateHUD();drawMini();draw();
})();
</script>
